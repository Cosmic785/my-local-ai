<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI 10k (Google Auth Edition)</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --bg: #131314; --sidebar: #1e1f20; --text: #e3e3e3; --gradient: linear-gradient(90deg, #4447e5, #b87cfc); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Login Overlay */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
        }

        /* Sidebar */
        #sidebar { width: 280px; background: var(--sidebar); padding: 15px; display: flex; flex-direction: column; gap: 10px; border-right: 1px solid #333; z-index: 1000; }
        .btn-new { background: #2d2f31; border-radius: 50px; padding: 12px; cursor: pointer; font-size: 14px; text-align: center; color: white; border: 1px solid #444; }
        #history-list { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 5px; margin-top: 15px; }
        .history-item { padding: 12px; border-radius: 8px; font-size: 13px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: #ccc; }
        .history-item.active { background: #37393b; color: white; border-left: 3px solid #b87cfc; }
        .del-btn { color: #ff5555; padding: 5px; font-weight: bold; opacity: 0.5; }

        /* Right-Click Menu */
        #context-menu { position: fixed; background: #2d2f31; border: 1px solid #444; border-radius: 8px; padding: 5px 0; min-width: 150px; display: none; z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .context-item { padding: 10px 20px; font-size: 13px; cursor: pointer; color: white; }
        .context-item:hover { background: #4447e5; }

        /* Chat Window */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; }
        #chat-window { flex: 1; overflow-y: auto; padding: 60px 15% 40px; display: flex; flex-direction: column; gap: 25px; }
        .row { display: flex; gap: 15px; }
        .avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; }
        .ai-avatar { background: var(--gradient); }
        .user-avatar { background: #5436da; }
        .content { font-size: 16px; line-height: 1.6; white-space: pre-wrap; width: 100%; }

        #input-container { padding: 20px 15%; background: var(--bg); }
        .input-box { background: #1e1f20; border-radius: 28px; padding: 8px 24px; display: flex; align-items: center; border: 1px solid #444; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 16px; padding: 10px 0; }
        button { background: none; border: none; color: #b87cfc; cursor: pointer; font-size: 24px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <h1 style="color: white; font-weight: 300;">Local AI Login</h1>
    <div id="g_id_onload"
         data-client_id="962541317340-h2tef7ghacll2okk8latem18qbsrs3hd.apps.googleusercontent.com"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin" data-type="standard"></div>
</div>

<div id="sidebar">
    <div id="user-display" style="font-size: 11px; color: #888; margin-bottom: 5px;">Guest Mode</div>
    <div class="btn-new" onclick="startNewChat()">+ New chat</div>
    <div id="history-list"></div>
</div>

<div id="context-menu">
    <div class="context-item" onclick="triggerRename()">✏️ Rename Chat</div>
</div>

<div id="main">
    <div id="chat-window"></div>
    <div id="input-container">
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Sign in to unlock AI..." disabled>
            <button id="sendBtn" onclick="askAI()" disabled>➤</button>
        </div>
    </div>
</div>

<script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

    let engine;
    let currentChatId = null;
    let rightClickedId = null;
    let chats = JSON.parse(localStorage.getItem('local_ai_chats')) || {};

    // 1. Auth Callback
    window.handleCredentialResponse = (response) => {
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        document.getElementById("user-display").innerText = payload.email;
        document.getElementById("login-overlay").style.display = "none";
        initEngine(); // Unlock AI after login
    };

    // 2. Right-Click Context Menu
    const ctxMenu = document.getElementById("context-menu");
    document.addEventListener("click", () => ctxMenu.style.display = "none");
    
    window.showContextMenu = (e, id) => {
        e.preventDefault();
        rightClickedId = id;
        ctxMenu.style.display = "block";
        ctxMenu.style.left = `${e.clientX}px`;
        ctxMenu.style.top = `${e.clientY}px`;
    };

    window.triggerRename = () => {
        const newName = prompt("Rename chat to:", chats[rightClickedId].title);
        if (newName) { chats[rightClickedId].title = newName.trim(); saveAndRefresh(); }
    };

    // 3. AI Logic
    async function initEngine() {
        try {
            document.getElementById("userInput").placeholder = "Loading engine...";
            engine = await CreateMLCEngine("Llama-3.2-1B-Instruct-q4f16_1-MLC");
            document.getElementById("userInput").disabled = false;
            document.getElementById("sendBtn").disabled = false;
            document.getElementById("userInput").placeholder = "Ask anything...";
        } catch (e) { console.error("WebGPU Error:", e); }
    }

    window.askAI = async () => {
        const input = document.getElementById("userInput");
        const text = input.value.trim();
        if (!text || !engine) return;

        if (chats[currentChatId].title === "New Chat") {
            chats[currentChatId].title = text.substring(0, 15) + "...";
        }

        chats[currentChatId].history.push({ role: "user", content: text });
        renderMessages();
        input.value = '';

        const chunks = await engine.chat.completions.create({ messages: chats[currentChatId].history, stream: true });
        let aiText = "";
        const row = addRowToUI("", "ai");
        for await (const chunk of chunks) {
            aiText += chunk.choices[0]?.delta?.content || "";
            row.querySelector(".content").innerText = aiText;
            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
        }
        chats[currentChatId].history.push({ role: "assistant", content: aiText });
        saveAndRefresh();
    };

    // 4. UI/History Management
    window.startNewChat = () => {
        currentChatId = Date.now().toString();
        chats[currentChatId] = { title: "New Chat", history: [] };
        saveAndRefresh();
        renderMessages();
    };

    window.deleteChat = (id) => {
        delete chats[id];
        currentChatId = Object.keys(chats).pop() || null;
        if (!currentChatId) startNewChat();
        saveAndRefresh();
    };

    function renderMessages() {
        const win = document.getElementById('chat-window');
        win.innerHTML = '';
        if (!currentChatId) return;
        chats[currentChatId].history.forEach(msg => addRowToUI(msg.content, msg.role === 'user' ? 'user' : 'ai'));
        win.scrollTop = win.scrollHeight;
    }

    function addRowToUI(text, type) {
        const win = document.getElementById('chat-window');
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `<div class="avatar ${type}-avatar"></div><div class="content">${text}</div>`;
        win.appendChild(row);
        return row;
    }

    function saveAndRefresh() { 
        localStorage.setItem('local_ai_chats', JSON.stringify(chats)); 
        updateSidebar(); 
    }

    function updateSidebar() {
        const list = document.getElementById('history-list');
        list.innerHTML = '';
        Object.keys(chats).sort((a,b) => b-a).forEach(id => {
            const item = document.createElement('div');
            item.className = `history-item ${id === currentChatId ? 'active' : ''}`;
            item.innerHTML = `<span onclick="selectChat('${id}')" oncontextmenu="showContextMenu(event, '${id}')" style="flex:1">${chats[id].title}</span>
                              <span class="del-btn" onclick="deleteChat('${id}')">✕</span>`;
            list.appendChild(item);
        });
    }

    window.selectChat = (id) => { currentChatId = id; renderMessages(); updateSidebar(); };
    document.getElementById('userInput').addEventListener("keypress", (e) => { if(e.key === "Enter") askAI(); });

    if (Object.keys(chats).length === 0) startNewChat();
    else selectChat(Object.keys(chats).sort().pop());
</script>
</body>
</html>
