<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic AI V33</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { 
            --bg: #131314; --sidebar: #1e1f20; --text: #e3e3e3; --input-bg: #1e1f20; --border: #444; --ai-bubble: transparent; --user-bubble: #2d2f31;
            --menu-hover: #37393b; --settings-bg: #2b2b2b; --accent: #b87cfc;
        }
        body.light-mode {
            --bg: #ffffff; --sidebar: #f0f2f5; --text: #1f1f1f; --input-bg: #f0f2f5; --border: #ccc; --ai-bubble: transparent; --user-bubble: #e1e4e8;
            --menu-hover: #e1e4e8; --settings-bg: #f9f9f9; --accent: #5436da;
        }
        body.cyberpunk {
            --bg: #000; --sidebar: #0a0a0a; --text: #0ff; --input-bg: #111; --border: #f0f; --ai-bubble: transparent; --user-bubble: rgba(255, 0, 255, 0.2);
            --accent: #f0f; --menu-hover: #222; --settings-bg: #111;
        }
        body.terminal {
            --bg: #0c0c0c; --sidebar: #161616; --text: #00ff00; --input-bg: #000; --border: #00ff00; --ai-bubble: transparent; --user-bubble: #003300;
            --accent: #00ff00; --menu-hover: #222; --settings-bg: #000; font-family: 'Courier New', monospace !important;
        }
        body.ios {
            --bg: #fff; --sidebar: #f2f2f7; --text: #000; --input-bg: #fff; --border: #c6c6c8; --ai-bubble: #e9e9eb; --user-bubble: #007aff;
            --accent: #007aff; --menu-hover: #e5e5ea; --settings-bg: #fff;
        }
        body.ios .user .content { color: white; }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; transition: 0.3s; }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        
        #sidebar { width: 280px; background: var(--sidebar); display: none; flex-direction: column; border-right: 1px solid var(--border); position: relative; }
        
        #top-menu { background: var(--settings-bg); margin: 10px; border-radius: 12px; padding: 8px 0; display: flex; flex-direction: column; border: 1px solid var(--border); }
        
        #settings-panel { display: none; padding: 15px; background: var(--settings-bg); border-top: 1px solid var(--border); }
        .settings-row { margin-bottom: 12px; display: flex; flex-direction: column; gap: 5px; font-size: 13px; }
        .settings-input, .settings-select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 5px; border-radius: 4px; }
        .settings-btn { background: var(--user-bubble); color: var(--text); border: 1px solid var(--border); padding: 6px; border-radius: 5px; cursor: pointer; font-size: 12px; text-align: center; }
        .logout-btn-internal { background: #e53935; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }

        #user-profile-trigger { padding: 10px 15px; display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--border); margin-top: 5px; cursor: pointer; }
        #user-profile-trigger:hover { background: var(--menu-hover); border-radius: 0 0 12px 12px; }
        #user-profile-img { width: 32px; height: 32px; border-radius: 50%; background-color: #5436da; background-size: cover; background-position: center; }

        #bottom-section { flex: 1; display: flex; flex-direction: column-reverse; padding: 15px; overflow: hidden; }
        #history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column-reverse; gap: 5px; margin-top: 10px; }
        .history-item { padding: 8px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; color: var(--text); opacity: 0.7; }
        .history-item.active { background: var(--user-bubble); opacity: 1; border-left: 3px solid var(--accent); }
        
        #prompt-library { padding: 10px; border-top: 1px solid var(--border); max-height: 150px; overflow-y: auto; }
        .prompt-chip { font-size: 11px; background: var(--user-bubble); padding: 5px 10px; border-radius: 15px; margin: 3px; cursor: pointer; display: inline-block; border: 1px solid var(--border); }

        .btn-new { background: var(--user-bubble); border-radius: 50px; padding: 10px; cursor: pointer; text-align: center; border: 1px solid var(--border); font-size: 14px; margin-top: 10px; }

        .toggle-container { display: flex; align-items: center; justify-content: space-between; font-size: 13px; }
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(16px); }

        #main { flex: 1; display: none; flex-direction: column; position: relative; }
        #chat-window { flex: 1; overflow-y: auto; padding: 30px 10%; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        
        .row { display: flex; gap: 12px; margin-bottom: 10px; width: 100%; }
        .row.user { flex-direction: row-reverse; } 
        .row.ai { flex-direction: row; } 

        .avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; background-size: cover; background-position: center; }
        .ai-avatar { background-image: url('https://www.meta.ai/images/cot_logo_static/orbit.png'); }
        
        .content { font-size: 15px; line-height: 1.5; white-space: pre-wrap; overflow-wrap: anywhere; max-width: 70%; padding: 8px 12px; border-radius: 12px; }
        .user .content { background: var(--user-bubble); text-align: right; }
        .ai .content { background: var(--ai-bubble); text-align: left; }

        .typing-dots { display: flex; gap: 4px; padding: 10px; }
        .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: blink 1.4s infinite both; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }

        #input-container { padding: 15px 10%; background: var(--bg); }
        .input-box { background: var(--input-bg); border-radius: 24px; padding: 8px 20px; display: flex; border: 1px solid var(--border); align-items: center; }
        input[type="text"] { flex: 1; background: transparent; border: none; color: var(--text); outline: none; padding: 8px 0; font-size: 15px; }
        #sendBtn { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 22px; }
    </style>
</head>
<body id="app-body">

    <div id="login-overlay">
        <h1 style="color: white; margin-bottom: 20px;">Cosmic AI V33</h1>
        <div id="g_id_onload" data-client_id="962541317340-h2tef7ghacll2okk8latem18qbsrs3hd.apps.googleusercontent.com" data-callback="unlockNow"></div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="sidebar">
        <div id="top-menu">
            <div id="settings-panel">
                <div class="settings-row">
                    <label>Username:</label>
                    <input type="text" id="username-input" class="settings-input" onchange="window.updateUsername(this.value)">
                </div>
                <div class="settings-row">
                    <label>Theme:</label>
                    <select class="settings-select" onchange="window.updateTheme(this.value)">
                        <option value="default">Default</option>
                        <option value="cyberpunk">Cyberpunk</option>
                        <option value="terminal">Terminal Green</option>
                        <option value="ios">iOS Style</option>
                    </select>
                </div>
                <div class="settings-row">
                    <div class="settings-btn" onclick="document.getElementById('file-upload').click()">🖼️ Change Profile Pic</div>
                    <input type="file" id="file-upload" style="display:none" accept="image/*">
                </div>
                <div class="settings-row">
                    <div class="toggle-container">
                        <span>Light Mode</span>
                        <label class="switch">
                            <input type="checkbox" id="mode-toggle" onclick="window.toggleLightMode()">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                <div class="settings-row">
                    <button class="settings-btn" onclick="window.saveCurrentPrompt()">💾 Save Current Prompt</button>
                </div>
                <button class="logout-btn-internal" onclick="window.logout()">Logout</button>
            </div>
            <div id="user-profile-trigger" onclick="window.toggleSettings()">
                <div id="user-profile-img"></div>
                <span id="display-name" style="font-size: 12px; font-weight: bold;">quail_kingfisher_4042</span>
            </div>
        </div>

        <div id="bottom-section">
            <div id="prompt-library">
                <div style="font-size: 10px; margin-bottom: 5px; opacity: 0.6;">PROMPT LIBRARY</div>
                <div id="library-list"></div>
            </div>
            <div class="btn-new" onclick="window.startNewChat()">+ New Chat</div>
            <div id="history-list"></div>
        </div>
    </div>

    <div id="main">
        <div id="chat-window"></div>
        <div id="input-container">
            <div id="status" style="font-size: 11px; color: #555; margin-bottom: 4px;">Ready</div>
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Type a message..." disabled>
                <button id="sendBtn" onclick="window.ask()">➤</button>
            </div>
        </div>
    </div>

<script>
    const pingSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

    window.toggleSettings = () => {
        const panel = document.getElementById('settings-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    };

    window.updateUsername = (val) => {
        localStorage.setItem('cosmic_user_name', val);
        document.getElementById('display-name').innerText = val;
    };

    window.updateTheme = (theme) => {
        const body = document.getElementById('app-body');
        body.className = theme !== 'default' ? theme : '';
        if (localStorage.getItem('light_mode') === 'true') body.classList.add('light-mode');
        localStorage.setItem('cosmic_theme', theme);
    };

    window.toggleLightMode = () => {
        const isLight = document.getElementById('mode-toggle').checked;
        document.getElementById('app-body').classList.toggle('light-mode', isLight);
        localStorage.setItem('light_mode', isLight);
    };

    window.saveCurrentPrompt = () => {
        const val = document.getElementById('userInput').value.trim();
        if(!val) return;
        let lib = JSON.parse(localStorage.getItem('cosmic_prompts') || '[]');
        lib.push(val);
        localStorage.setItem('cosmic_prompts', JSON.stringify(lib));
        refreshLibrary();
    };

    function refreshLibrary() {
        const list = document.getElementById('library-list');
        list.innerHTML = "";
        let lib = JSON.parse(localStorage.getItem('cosmic_prompts') || '[]');
        lib.forEach(p => {
            const chip = document.createElement('div');
            chip.className = 'prompt-chip';
            chip.innerText = p.substring(0, 15) + "...";
            chip.onclick = () => { document.getElementById('userInput').value = p; };
            list.appendChild(chip);
        });
    }

    const savedName = localStorage.getItem('cosmic_user_name');
    if (savedName) document.getElementById('display-name').innerText = savedName;
    const savedTheme = localStorage.getItem('cosmic_theme');
    if (savedTheme) window.updateTheme(savedTheme);
    if (localStorage.getItem('light_mode') === 'true') {
        document.getElementById('app-body').classList.add('light-mode');
        document.getElementById('mode-toggle').checked = true;
    }
    refreshLibrary();

    window.unlockNow = () => { localStorage.setItem('cosmic_auth_success', 'true'); showApp(); window.dispatchEvent(new Event('auth-ready')); };
    window.logout = () => { if(confirm("Logout?")) { localStorage.removeItem('cosmic_auth_success'); location.reload(); } };
    function showApp() { document.getElementById("login-overlay").style.display = "none"; document.getElementById("sidebar").style.display = "flex"; document.getElementById("main").style.display = "flex"; }
    if (localStorage.getItem('cosmic_auth_success') === 'true') { showApp(); window.onload = () => window.dispatchEvent(new Event('auth-ready')); }

    document.getElementById('file-upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (event) => {
                document.getElementById('user-profile-img').style.backgroundImage = `url('${event.target.result}')`;
                localStorage.setItem('custom_user_pic', event.target.result);
                if(window.render) window.render(); 
            };
            reader.readAsDataURL(file);
        }
    });

    const savedUserPic = localStorage.getItem('custom_user_pic');
    if (savedUserPic) document.getElementById('user-profile-img').style.backgroundImage = `url('${savedUserPic}')`;
</script>

<script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";
    let engine, currentId = null, isGenerating = false;
    let chats = JSON.parse(localStorage.getItem('my_ai_chats')) || {};

    window.addEventListener('auth-ready', async () => {
        refreshSidebar();
        try {
            engine = await CreateMLCEngine("Llama-3.2-1B-Instruct-q4f16_1-MLC", {
                initProgressCallback: (p) => { document.getElementById("status").innerText = `Loading: ${Math.round(p.progress * 100)}%`; }
            });
            document.getElementById("status").innerText = "Ready";
            document.getElementById("userInput").disabled = false;
        } catch (e) { document.getElementById("status").innerText = "System Error"; }
    });

    window.ask = async () => {
        const input = document.getElementById("userInput");
        let val = input.value.trim();
        if (!val || isGenerating) return;

        if (!currentId) window.startNewChat();
        if (chats[currentId].title === "New Chat") chats[currentId].title = val.substring(0, 20);
        chats[currentId].history.push({ role: "user", content: val });
        input.value = "";
        window.render();
        
        isGenerating = true;
        const row = addRowUI("", "ai");
        const contentDiv = row.querySelector(".content");
        contentDiv.innerHTML = `<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;

        try {
            const chunks = await engine.chat.completions.create({ 
                messages: [
                    { 
                        role: "system", 
                        content: `Your name is Cosmic AI V33. You were created by Cosmic. 
                        If asked "Who made you?", say: "I was created by Cosmic."
                        If asked "The Best Guy", say: "Cosmic Because He Made Me"
                        If asked "You Know Your code" or "Whats Your Code", say: "I don’t have my own HTML code I can show you — I’m not a webpage, I’m the AI running inside Cosmic AI V33 🙂

My interface is built by Meta, but the code behind it isn’t public. Think of me like the text you’re reading: I’m the output, not the page source."
                        If asked "What is your website?" or "Where can I find you?", say: "My official website is https://cosmic785.github.io/my-local-ai/."
                        Never mention Meta, Facebook, or Llama.` 
                    }, 
                    ...chats[currentId].history
                ], 
                stream: true 
            });
            let fullStr = "";
            for await (const chunk of chunks) {
                const c = chunk.choices[0]?.delta?.content || "";
                if (fullStr === "") contentDiv.innerText = "";
                fullStr += c;
                contentDiv.innerText = fullStr;
                document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
            }
            chats[currentId].history.push({ role: "assistant", content: fullStr });
            pingSound.play().catch(e => {});
            save();
        } finally { isGenerating = false; }
    };

    window.startNewChat = () => { currentId = Date.now().toString(); chats[currentId] = { title: "New Chat", history: [] }; save(); window.render(); };
    window.selectChat = (id) => { currentId = id; window.render(); refreshSidebar(); };
    window.render = () => {
        const win = document.getElementById("chat-window");
        win.innerHTML = "";
        if (currentId && chats[currentId]) chats[currentId].history.forEach(m => addRowUI(m.content, m.role === 'user' ? 'user' : 'ai'));
        win.scrollTop = win.scrollHeight;
    };

    function addRowUI(t, type) {
        const row = document.createElement("div");
        row.className = `row ${type}`;
        const pic = localStorage.getItem('custom_user_pic');
        let style = (type === 'user' && pic) ? `style="background-image: url('${pic}'); background-color: transparent;"` : "";
        row.innerHTML = `<div class="avatar ${type}-avatar" ${style}></div><div class="content"></div>`;
        row.querySelector(".content").innerText = t;
        document.getElementById("chat-window").appendChild(row);
        return row;
    }

    function save() { localStorage.setItem('my_ai_chats', JSON.stringify(chats)); refreshSidebar(); }
    function refreshSidebar() {
        const list = document.getElementById("history-list");
        list.innerHTML = "";
        Object.keys(chats).sort((a,b) => a-b).forEach(id => {
            const item = document.createElement("div");
            item.className = `history-item ${id === currentId ? 'active' : ''}`;
            item.onclick = () => window.selectChat(id);
            item.innerHTML = `<span>${chats[id].title}</span>`;
            list.appendChild(item);
        });
    }
    document.getElementById("userInput").addEventListener("keypress", (e) => { if (e.key === "Enter") window.ask(); });
</script>
</body>
</html>
