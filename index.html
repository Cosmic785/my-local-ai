<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Ai V2</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --bg: #131314; --sidebar: #1e1f20; --text: #e3e3e3; --gradient: linear-gradient(90deg, #4447e5, #b87cfc); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        
        /* WARNING SCREEN */
        #warning-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; 
            display: none; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 9998; text-align: center; font-family: 'Courier New', Courier, monospace;
        }
        .warn-text { color: #ff0000; font-size: 24px; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .warn-sub { color: #ff0000; font-size: 14px; margin-bottom: 30px; }
        .btn-continue { background: transparent; border: 2px solid #ff0000; color: #ff0000; padding: 10px 20px; cursor: pointer; font-family: inherit; font-weight: bold; transition: 0.3s; }
        .btn-continue:hover { background: #ff0000; color: #000; }

        #sidebar { width: 260px; background: var(--sidebar); padding: 15px; display: none; flex-direction: column; border-right: 1px solid #333; position: relative; }
        .btn-new { background: #2d2f31; border-radius: 50px; padding: 10px; cursor: pointer; text-align: center; border: 1px solid #444; margin-bottom: 15px; font-size: 14px; }
        
        #history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .history-item { padding: 8px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: #aaa; }
        .history-item.active { background: #37393b; color: white; border-left: 3px solid #b87cfc; }
        .item-actions { display: none; gap: 10px; }
        .history-item:hover .item-actions { display: flex; }

        /* BUG REPORT LINK - BOTTOM LEFT */
        #bug-report-link { 
            position: absolute; bottom: 15px; left: 15px; font-size: 11px; color: white; 
            text-decoration: none; opacity: 0.6; transition: 0.3s; font-family: 'Courier New', monospace;
        }
        #bug-report-link:hover { opacity: 1; text-decoration: underline; }

        #main { flex: 1; display: none; flex-direction: column; position: relative; }
        #chat-window { flex: 1; overflow-y: auto; padding: 30px 10%; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        #input-container { padding: 15px 10%; background: var(--bg); }
        .input-box { background: #1e1f20; border-radius: 24px; padding: 8px 20px; display: flex; border: 1px solid #444; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; padding: 8px 0; font-size: 15px; }
        
        .row { display: flex; gap: 12px; margin-bottom: 10px; }
        .avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; }
        .ai-avatar { background: var(--gradient); }
        .user-avatar { background: #5436da; }
        .content { font-size: 15px; line-height: 1.5; white-space: pre-wrap; overflow-wrap: anywhere; }

        #stopBtn { display: none; background: #c62828; color: white; border: none; border-radius: 50%; width: 32px; height: 32px; cursor: pointer; font-size: 12px; margin-left: 10px; justify-content: center; align-items: center; }
        #sendBtn { background: none; border: none; color: #b87cfc; cursor: pointer; font-size: 22px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h1 style="color: white; margin-bottom: 20px;">Start By Login!</h1>
        <div id="g_id_onload"
             data-client_id="962541317340-h2tef7ghacll2okk8latem18qbsrs3hd.apps.googleusercontent.com"
             data-callback="unlockNow">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="warning-screen">
        <div class="warn-text">WARNING</div>
        <div class="warn-sub">If you see bugs please report back.</div>
        <button class="btn-continue" onclick="window.closeWarning()">CONTINUE</button>
    </div>

    <div id="sidebar">
        <div class="btn-new" onclick="window.startNewChat()">+ New Chat</div>
        <div id="history-list"></div>
        
        <a id="bug-report-link" href="https://github.com/Cosmic785/my-local-ai" target="_blank">Report A Bug</a>
    </div>

    <div id="main">
        <div id="chat-window"></div>
        <div id="input-container">
            <div id="status" style="font-size: 10px; color: #555; margin-bottom: 4px;">Locked</div>
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Waiting..." disabled>
                <button id="sendBtn" onclick="window.ask()">➤</button>
                <button id="stopBtn" onclick="window.stopAI()">■</button>
            </div>
        </div>
    </div>

<script>
    window.unlockNow = (response) => {
        document.getElementById("login-overlay").style.display = "none";
        document.getElementById("warning-screen").style.display = "flex";
    };

    window.closeWarning = () => {
        document.getElementById("warning-screen").style.display = "none";
        document.getElementById("sidebar").style.display = "flex";
        document.getElementById("main").style.display = "flex";
        window.dispatchEvent(new Event('auth-ready'));
    };
</script>

<script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

    let engine;
    let currentId = null;
    let chats = JSON.parse(localStorage.getItem('my_ai_chats')) || {};
    let isGenerating = false;

    window.addEventListener('auth-ready', async () => {
        const status = document.getElementById("status");
        refreshSidebar();
        try {
            const model = "Llama-3.2-1B-Instruct-q4f16_1-MLC"; 
            engine = await CreateMLCEngine(model, {
                initProgressCallback: (p) => { status.innerText = `Brain Loading: ${Math.round(p.progress * 100)}%`; }
            });
            status.innerText = "Stable AI Active";
            document.getElementById("userInput").disabled = false;
            document.getElementById("userInput").placeholder = "Message...";
        } catch (e) { 
            status.innerText = "Hardware Error - Please Refresh";
        }
    });

    window.stopAI = async () => {
        if (engine && isGenerating) {
            isGenerating = false; 
            await engine.interruptGenerate();
            toggleButtons(false);
        }
    };

    function toggleButtons(generating) {
        isGenerating = generating;
        document.getElementById("stopBtn").style.display = generating ? "flex" : "none";
        document.getElementById("sendBtn").style.display = generating ? "none" : "block";
    }

    window.ask = async () => {
        const input = document.getElementById("userInput");
        const val = input.value.trim();
        if (!val || !engine || isGenerating) return;

        if (!currentId) window.startNewChat();
        if (chats[currentId].title === "New Chat") chats[currentId].title = val.substring(0, 20);

        chats[currentId].history.push({ role: "user", content: val });
        input.value = "";
        render();
        refreshSidebar();
        toggleButtons(true);

        try {
            const chunks = await engine.chat.completions.create({ 
                messages: [{ role: "system", content: "Smart AI." }, ...chats[currentId].history], 
                stream: true 
            });
            
            let fullAiResponse = "";
            const row = addRowUI("", "ai");

            for await (const chunk of chunks) {
                if (!isGenerating) break; 
                fullAiResponse += chunk.choices[0]?.delta?.content || "";
                row.querySelector(".content").innerText = fullAiResponse;
                document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
            }
            
            if (fullAiResponse) {
                chats[currentId].history.push({ role: "assistant", content: fullAiResponse + (!isGenerating ? " [Stopped]" : "") });
                save();
            }
        } catch (err) { console.error(err); } 
        finally {
            isGenerating = false;
            toggleButtons(false);
        }
    };

    window.startNewChat = () => {
        if (isGenerating) window.stopAI();
        currentId = Date.now().toString();
        chats[currentId] = { title: "New Chat", history: [] };
        save();
        render();
    };

    window.selectChat = (id) => {
        if (isGenerating) window.stopAI();
        currentId = id;
        render();
        refreshSidebar();
    };

    window.renameChat = (id, e) => {
        e.stopPropagation();
        const newName = prompt("New Name:", chats[id].title);
        if (newName) { chats[id].title = newName; save(); }
    };

    window.deleteChat = (id, e) => {
        e.stopPropagation();
        if (confirm("Delete this conversation?")) {
            delete chats[id];
            if (currentId === id) currentId = null;
            save();
            render();
        }
    };

    function render() {
        const win = document.getElementById("chat-window");
        win.innerHTML = "";
        if (currentId && chats[currentId]) {
            chats[currentId].history.forEach(m => addRowUI(m.content, m.role === 'user' ? 'user' : 'ai'));
        }
        win.scrollTop = win.scrollHeight;
    }

    function addRowUI(t, type) {
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `<div class="avatar ${type}-avatar"></div><div class="content">${t}</div>`;
        document.getElementById("chat-window").appendChild(row);
        return row;
    }

    function save() {
        localStorage.setItem('my_ai_chats', JSON.stringify(chats));
        refreshSidebar();
    }

    function refreshSidebar() {
        const list = document.getElementById("history-list");
        list.innerHTML = "";
        Object.keys(chats).sort((a,b) => b-a).forEach(id => {
            const item = document.createElement("div");
            item.className = `history-item ${id === currentId ? 'active' : ''}`;
            item.onclick = () => window.selectChat(id);
            item.innerHTML = `<span>${chats[id].title}</span>
                <div class="item-actions">
                    <span onclick="window.renameChat('${id}', event)">✏️</span>
                    <span onclick="window.deleteChat('${id}', event)">✕</span>
                </div>`;
            list.appendChild(item);
        });
    }

    document.getElementById("userInput").addEventListener("keypress", (e) => { if (e.key === "Enter") window.ask(); });
</script>
</body>
</html>
