<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local AI 10k</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --bg: #131314; --sidebar: #1e1f20; --text: #e3e3e3; --gradient: linear-gradient(90deg, #4447e5, #b87cfc); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }

        #sidebar { width: 280px; background: var(--sidebar); padding: 15px; display: none; flex-direction: column; gap: 10px; border-right: 1px solid #333; }
        #main { flex: 1; display: none; flex-direction: column; position: relative; }
        
        .btn-new { background: #2d2f31; border-radius: 50px; padding: 12px; cursor: pointer; text-align: center; color: white; border: 1px solid #444; }
        #chat-window { flex: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 20px; }
        .row { display: flex; gap: 15px; margin-bottom: 10px; }
        .avatar { width: 30px; height: 30px; border-radius: 50%; }
        .ai-avatar { background: var(--gradient); }
        .user-avatar { background: #5436da; }

        #input-container { padding: 20px 15%; }
        .input-box { background: #1e1f20; border-radius: 28px; padding: 10px 20px; display: flex; border: 1px solid #444; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; }
        button { background: none; border: none; color: #b87cfc; cursor: pointer; font-size: 20px; }
        #status { font-size: 10px; color: #666; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h1 style="color:white; margin-bottom: 20px;">Local AI 10k</h1>
        <div id="g_id_onload"
             data-client_id="962541317340-h2tef7ghacll2okk8latem18qbsrs3hd.apps.googleusercontent.com"
             data-callback="onSignInSuccess">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="sidebar">
        <div class="btn-new" onclick="window.startNewChat()">+ New Chat</div>
        <div id="history-list"></div>
    </div>

    <div id="main">
        <div id="chat-window"></div>
        <div id="input-container">
            <div id="status">System Standby</div>
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Loading engine..." disabled>
                <button id="sendBtn" onclick="window.askAI()" disabled>➤</button>
            </div>
        </div>
    </div>

<script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

    // Attach functions to 'window' so the HTML buttons can see them
    let engine;
    let chats = JSON.parse(localStorage.getItem('local_ai_chats')) || {};
    let currentId = null;

    window.onSignInSuccess = (response) => {
        document.getElementById("login-overlay").style.display = "none";
        document.getElementById("sidebar").style.display = "flex";
        document.getElementById("main").style.display = "flex";
        initAI();
    };

    async function initAI() {
        const stat = document.getElementById("status");
        try {
            engine = await CreateMLCEngine("Llama-3.2-1B-Instruct-q4f16_1-MLC", {
                initProgressCallback: (p) => { stat.innerText = `Loading: ${Math.round(p.progress * 100)}%`; }
            });
            stat.innerText = "Engine Ready";
            document.getElementById("userInput").disabled = false;
            document.getElementById("sendBtn").disabled = false;
        } catch (e) { stat.innerText = "WebGPU Error"; }
    }

    window.askAI = async () => {
        const msg = document.getElementById("userInput").value;
        if (!msg || !engine) return;
        
        if (!currentId) window.startNewChat();
        chats[currentId].history.push({ role: "user", content: msg });
        document.getElementById("userInput").value = "";
        render();

        const chunks = await engine.chat.completions.create({ messages: chats[currentId].history, stream: true });
        let aiMsg = "";
        const row = addRow("", "ai");
        
        for await (const chunk of chunks) {
            aiMsg += chunk.choices[0]?.delta?.content || "";
            row.querySelector(".content").innerText = aiMsg;
        }
        chats[currentId].history.push({ role: "assistant", content: aiMsg });
        localStorage.setItem('local_ai_chats', JSON.stringify(chats));
    };

    window.startNewChat = () => {
        currentId = Date.now().toString();
        chats[currentId] = { title: "Chat", history: [] };
        render();
    };

    function render() {
        const win = document.getElementById("chat-window");
        win.innerHTML = "";
        if (currentId) chats[currentId].history.forEach(m => addRow(m.content, m.role));
    }

    function addRow(t, type) {
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `<div class="avatar ${type}-avatar"></div><div class="content">${t}</div>`;
        document.getElementById("chat-window").appendChild(row);
        return row;
    }
</script>
</body>
</html>
