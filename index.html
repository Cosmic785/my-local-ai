<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notepad AI</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --bg: #131314; --sidebar: #1e1f20; --text: #e3e3e3; --gradient: linear-gradient(90deg, #4447e5, #b87cfc); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        
        /* Sidebar Styles */
        #sidebar { width: 280px; background: var(--sidebar); padding: 15px; display: none; flex-direction: column; border-right: 1px solid #333; }
        .btn-new { background: #2d2f31; border-radius: 50px; padding: 12px; cursor: pointer; text-align: center; border: 1px solid #444; margin-bottom: 15px; transition: 0.2s; }
        .btn-new:hover { background: #37393b; }
        
        #history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .history-item { padding: 10px; border-radius: 8px; font-size: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: #ccc; }
        .history-item:hover { background: #2d2f31; }
        .history-item.active { background: #37393b; color: white; border-left: 3px solid #b87cfc; }
        .item-actions { display: none; gap: 8px; }
        .history-item:hover .item-actions { display: flex; }
        .action-btn { opacity: 0.6; cursor: pointer; }
        .action-btn:hover { opacity: 1; }

        #main { flex: 1; display: none; flex-direction: column; }
        #chat-window { flex: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 20px; }
        #input-container { padding: 20px 15%; background: var(--bg); }
        .input-box { background: #1e1f20; border-radius: 28px; padding: 10px 24px; display: flex; border: 1px solid #444; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; }
        
        .row { display: flex; gap: 15px; margin-bottom: 15px; }
        .avatar { width: 30px; height: 30px; border-radius: 50%; }
        .ai-avatar { background: var(--gradient); }
        .user-avatar { background: #5436da; }
        .content { font-size: 16px; line-height: 1.6; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h1 style="color: white; margin-bottom: 20px;">My Notepad AI</h1>
        <div id="g_id_onload"
             data-client_id="962541317340-h2tef7ghacll2okk8latem18qbsrs3hd.apps.googleusercontent.com"
             data-callback="unlockNow">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="sidebar">
        <div class="btn-new" onclick="window.startNewChat()">+ New Chat</div>
        <div id="history-list"></div>
    </div>

    <div id="main">
        <div id="chat-window"></div>
        <div id="input-container">
            <div id="status" style="font-size: 10px; color: #666; margin-bottom: 5px;">Awaiting Login</div>
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Sign in to begin..." disabled>
                <button onclick="window.ask()" style="background:none; border:none; color:#b87cfc; cursor:pointer; font-size:20px;">➤</button>
            </div>
        </div>
    </div>

<script>
    // Global bridge for Google Auth
    window.unlockNow = (response) => {
        document.getElementById("login-overlay").style.display = "none";
        document.getElementById("sidebar").style.display = "flex";
        document.getElementById("main").style.display = "flex";
        window.dispatchEvent(new Event('auth-ready'));
    };
</script>

<script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

    let engine;
    let currentId = null;
    let chats = JSON.parse(localStorage.getItem('my_ai_chats')) || {};

    window.addEventListener('auth-ready', async () => {
        const status = document.getElementById("status");
        refreshSidebar();
        try {
            engine = await CreateMLCEngine("Llama-3.2-1B-Instruct-q4f16_1-MLC", {
                initProgressCallback: (p) => { status.innerText = `AI Loading: ${Math.round(p.progress * 100)}%`; }
            });
            status.innerText = "Local AI Online";
            document.getElementById("userInput").disabled = false;
            document.getElementById("userInput").placeholder = "Message AI...";
        } catch (e) { status.innerText = "Hardware Error"; }
    });

    window.startNewChat = () => {
        currentId = Date.now().toString();
        chats[currentId] = { title: "New Chat", history: [] };
        save();
        render();
    };

    window.selectChat = (id) => {
        currentId = id;
        render();
        refreshSidebar();
    };

    window.renameChat = (id, e) => {
        e.stopPropagation();
        const newName = prompt("Enter new name:", chats[id].title);
        if (newName) {
            chats[id].title = newName;
            save();
        }
    };

    window.deleteChat = (id, e) => {
        e.stopPropagation();
        if (confirm("Delete this chat?")) {
            delete chats[id];
            if (currentId === id) currentId = null;
            save();
            render();
        }
    };

    window.ask = async () => {
        const input = document.getElementById("userInput");
        const val = input.value.trim();
        if (!val || !engine) return;

        if (!currentId) window.startNewChat();
        
        // Auto-rename from first message
        if (chats[currentId].title === "New Chat") {
            chats[currentId].title = val.substring(0, 20);
        }

        chats[currentId].history.push({ role: "user", content: val });
        input.value = "";
        render();
        refreshSidebar();

        const chunks = await engine.chat.completions.create({ messages: chats[currentId].history, stream: true });
        let aiMsg = "";
        const row = addRowUI("", "ai");

        for await (const chunk of chunks) {
            aiMsg += chunk.choices[0]?.delta?.content || "";
            row.querySelector(".content").innerText = aiMsg;
            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
        }
        chats[currentId].history.push({ role: "assistant", content: aiMsg });
        save();
    };

    function render() {
        const win = document.getElementById("chat-window");
        win.innerHTML = "";
        if (currentId && chats[currentId]) {
            chats[currentId].history.forEach(m => addRowUI(m.content, m.role === 'user' ? 'user' : 'ai'));
        }
    }

    function addRowUI(t, type) {
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `<div class="avatar ${type}-avatar"></div><div class="content">${t}</div>`;
        document.getElementById("chat-window").appendChild(row);
        return row;
    }

    function save() {
        localStorage.setItem('my_ai_chats', JSON.stringify(chats));
        refreshSidebar();
    }

    function refreshSidebar() {
        const list = document.getElementById("history-list");
        list.innerHTML = "";
        Object.keys(chats).sort((a,b) => b-a).forEach(id => {
            const item = document.createElement("div");
            item.className = `history-item ${id === currentId ? 'active' : ''}`;
            item.onclick = () => window.selectChat(id);
            item.innerHTML = `
                <span>${chats[id].title}</span>
                <div class="item-actions">
                    <span class="action-btn" onclick="window.renameChat('${id}', event)">✏️</span>
                    <span class="action-btn" onclick="window.deleteChat('${id}', event)">✕</span>
                </div>
            `;
            list.appendChild(item);
        });
    }
</script>
</body>
</html>
