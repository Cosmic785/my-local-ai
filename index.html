<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Notepad AI</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --bg: #131314; --sidebar: #1e1f20; --text: #e3e3e3; --gradient: linear-gradient(90deg, #4447e5, #b87cfc); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        #sidebar { width: 280px; background: var(--sidebar); padding: 15px; display: none; flex-direction: column; border-right: 1px solid #333; }
        #main { flex: 1; display: none; flex-direction: column; }
        .btn-new { background: #2d2f31; border-radius: 50px; padding: 12px; cursor: pointer; text-align: center; border: 1px solid #444; margin-bottom: 10px;}
        #chat-window { flex: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 20px; }
        #input-container { padding: 20px 15%; background: var(--bg); }
        .input-box { background: #1e1f20; border-radius: 28px; padding: 10px 24px; display: flex; border: 1px solid #444; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; }
        .row { display: flex; gap: 15px; margin-bottom: 15px; }
        .avatar { width: 30px; height: 30px; border-radius: 50%; }
        .ai-avatar { background: var(--gradient); }
        .user-avatar { background: #5436da; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h1 style="color: white; margin-bottom: 20px;">My Notepad AI</h1>
        <div id="g_id_onload"
             data-client_id="962541317340-h2tef7ghacll2okk8latem18qbsrs3hd.apps.googleusercontent.com"
             data-callback="unlockNow"
             data-ux_mode="popup"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_blue" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
    </div>

    <div id="sidebar">
        <div class="btn-new" onclick="window.startChat()">+ New Chat</div>
        <div id="history-list"></div>
    </div>

    <div id="main">
        <div id="chat-window"></div>
        <div id="input-container">
            <div id="status" style="font-size: 10px; color: #666; margin-bottom: 5px;">Ready for Auth</div>
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Please login..." disabled>
                <button onclick="window.ask()" style="background:none; border:none; color:#b87cfc; cursor:pointer; font-size:20px;">➤</button>
            </div>
        </div>
    </div>

<script>
    // This function stays global to ensure Google can find it immediately
    window.unlockNow = (response) => {
        console.log("Auth Success!");
        document.getElementById("login-overlay").style.display = "none";
        document.getElementById("sidebar").style.display = "flex";
        document.getElementById("main").style.display = "flex";
        
        // Signal the AI module to start
        window.dispatchEvent(new Event('auth-ready'));
    };
</script>

<script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

    let engine;
    let history = [];

    window.addEventListener('auth-ready', async () => {
        const status = document.getElementById("status");
        try {
            // Using a lightweight model for better performance in browser
            engine = await CreateMLCEngine("Llama-3.2-1B-Instruct-q4f16_1-MLC", {
                initProgressCallback: (p) => { status.innerText = `AI Loading: ${Math.round(p.progress * 100)}%`; }
            });
            status.innerText = "Local AI Online";
            document.getElementById("userInput").disabled = false;
            document.getElementById("userInput").placeholder = "Ask something...";
        } catch (e) { 
            status.innerText = "Hardware/WebGPU Error";
            console.error(e);
        }
    });

    window.startChat = () => {
        document.getElementById("chat-window").innerHTML = "";
        history = [];
    };

    window.ask = async () => {
        const input = document.getElementById("userInput");
        const val = input.value.trim();
        if (!val || !engine) return;

        history.push({ role: "user", content: val });
        input.value = "";
        render();

        const chunks = await engine.chat.completions.create({ messages: history, stream: true });
        let aiMsg = "";
        const row = addRowUI("", "ai");

        for await (const chunk of chunks) {
            aiText = chunk.choices[0]?.delta?.content || "";
            aiMsg += aiText;
            row.querySelector(".content").innerText = aiMsg;
            document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
        }
        history.push({ role: "assistant", content: aiMsg });
    };

    function render() {
        const win = document.getElementById("chat-window");
        win.innerHTML = "";
        history.forEach(m => addRowUI(m.content, m.role === 'user' ? 'user' : 'ai'));
    }

    function addRowUI(t, type) {
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `<div class="avatar ${type}-avatar"></div><div class="content">${t}</div>`;
        document.getElementById("chat-window").appendChild(row);
        return row;
    }
</script>
</body>
</html>
