<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic AI V18</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --bg: #131314; --sidebar: #1e1f20; --text: #e3e3e3; --gradient: linear-gradient(90deg, #4447e5, #b87cfc); }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        
        #sidebar { width: 260px; background: var(--sidebar); padding: 15px; display: none; flex-direction: column; border-right: 1px solid #333; position: relative; }
        .btn-new { background: #2d2f31; border-radius: 50px; padding: 10px; cursor: pointer; text-align: center; border: 1px solid #444; margin-bottom: 15px; font-size: 14px; }
        
        #history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .history-item { padding: 8px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: #aaa; }
        .history-item.active { background: #37393b; color: white; border-left: 3px solid #b87cfc; }
        .item-actions { display: none; gap: 10px; font-size: 14px; }
        .history-item:hover .item-actions { display: flex; }

        /* Report a Bug link style */
        #bug-report-link { position: absolute; bottom: 15px; left: 15px; font-size: 12px; color: white; text-decoration: none; opacity: 0.8; }
        #bug-report-link:hover { opacity: 1; text-decoration: underline; }

        #main { flex: 1; display: none; flex-direction: column; position: relative; }
        #chat-window { flex: 1; overflow-y: auto; padding: 30px 10%; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        #input-container { padding: 15px 10%; background: var(--bg); }
        .input-box { background: #1e1f20; border-radius: 24px; padding: 8px 20px; display: flex; border: 1px solid #444; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; padding: 8px 0; font-size: 15px; font-family: inherit; }
        
        .row { display: flex; gap: 12px; margin-bottom: 10px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; background-size: contain; background-repeat: no-repeat; background-position: center; }
        
        .ai-avatar { background-image: url('https://www.meta.ai/images/cot_logo_static/orbit.png'); }
        .user-avatar { background: #5436da; }
        .content { font-size: 15px; line-height: 1.5; white-space: pre-wrap; overflow-wrap: anywhere; align-self: center; }

        #sendBtn { background: none; border: none; color: #b87cfc; cursor: pointer; font-size: 22px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <h1 style="color: white; margin-bottom: 20px;">Free Trial Start Now</h1>
        <div id="g_id_onload" data-client_id="962541317340-h2tef7ghacll2okk8latem18qbsrs3hd.apps.googleusercontent.com" data-callback="unlockNow"></div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="sidebar">
        <div class="btn-new" onclick="window.startNewChat()">+ New Chat</div>
        <div id="history-list"></div>
        <a id="bug-report-link" href="https://github.com/Cosmic785/my-local-ai" target="_blank">Report A Bug</a>
    </div>

    <div id="main">
        <div id="chat-window"></div>
        <div id="input-container">
            <div id="status" style="font-size: 10px; color: #555; margin-bottom: 4px;">Locked</div>
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Waiting..." disabled>
                <button id="sendBtn" onclick="window.ask()">➤</button>
            </div>
        </div>
    </div>

<script>
    window.unlockNow = (response) => {
        document.getElementById("login-overlay").style.display = "none";
        document.getElementById("sidebar").style.display = "flex";
        document.getElementById("main").style.display = "flex";
        window.dispatchEvent(new Event('auth-ready'));
    };
</script>

<script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

    let engine;
    let currentId = null;
    let chats = JSON.parse(localStorage.getItem('my_ai_chats')) || {};
    let isGenerating = false;

    window.addEventListener('auth-ready', async () => {
        const status = document.getElementById("status");
        refreshSidebar();
        try {
            const model = "Llama-3.2-1B-Instruct-q4f16_1-MLC"; 
            engine = await CreateMLCEngine(model, {
                initProgressCallback: (p) => { status.innerText = `Loading: ${Math.round(p.progress * 100)}%`; }
            });
            status.innerText = "Ready";
            document.getElementById("userInput").disabled = false;
        } catch (e) { status.innerText = "System Error"; }
    });

    window.ask = async () => {
        const input = document.getElementById("userInput");
        const val = input.value.trim();
        if (!val || !engine || isGenerating) return;

        if (!currentId) window.startNewChat();
        if (chats[currentId].title === "New Chat") chats[currentId].title = val.substring(0, 20);
        
        chats[currentId].history.push({ role: "user", content: val });
        input.value = "";
        render();
        refreshSidebar();
        isGenerating = true;

        try {
            const chunks = await engine.chat.completions.create({ 
                messages: [{ role: "system", content: "You are My Notepad AI, an expert developer assistant." }, ...chats[currentId].history], 
                stream: true 
            });
            
            let fullAiResponse = "";
            const row = addRowUI("", "ai");

            for await (const chunk of chunks) {
                const content = chunk.choices[0]?.delta?.content || "";
                fullAiResponse += content;
                row.querySelector(".content").innerText = fullAiResponse;
                document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
            }
            
            chats[currentId].history.push({ role: "assistant", content: fullAiResponse });
            save();
        } catch (err) { console.error(err); } 
        finally { isGenerating = false; }
    };

    window.startNewChat = () => {
        currentId = Date.now().toString();
        chats[currentId] = { title: "New Chat", history: [] };
        save();
        render();
    };

    window.selectChat = (id) => {
        currentId = id;
        render();
        refreshSidebar();
    };

    // Rename Logic
    window.renameChat = (id, e) => {
        e.stopPropagation();
        const newName = prompt("New Name:", chats[id].title);
        if (newName) { chats[id].title = newName; save(); }
    };

    // Delete Logic
    window.deleteChat = (id, e) => {
        e.stopPropagation();
        if (confirm("Delete this chat?")) {
            delete chats[id];
            if (currentId === id) currentId = null;
            save();
            render();
        }
    };

    function render() {
        const win = document.getElementById("chat-window");
        win.innerHTML = "";
        if (currentId && chats[currentId]) {
            chats[currentId].history.forEach(m => addRowUI(m.content, m.role === 'user' ? 'user' : 'ai'));
        }
        win.scrollTop = win.scrollHeight;
    }

    function addRowUI(t, type) {
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `<div class="avatar ${type}-avatar"></div><div class="content"></div>`;
        row.querySelector(".content").innerText = t;
        document.getElementById("chat-window").appendChild(row);
        return row;
    }

    function save() {
        localStorage.setItem('my_ai_chats', JSON.stringify(chats));
        refreshSidebar();
    }

    function refreshSidebar() {
        const list = document.getElementById("history-list");
        list.innerHTML = "";
        Object.keys(chats).sort((a,b) => b-a).forEach(id => {
            const item = document.createElement("div");
            item.className = `history-item ${id === currentId ? 'active' : ''}`;
            item.onclick = () => window.selectChat(id);
            item.innerHTML = `<span></span>
                <div class="item-actions">
                    <span onclick="window.renameChat('${id}', event)">✏️</span>
                    <span onclick="window.deleteChat('${id}', event)">✕</span>
                </div>`;
            item.querySelector("span").innerText = chats[id].title;
            list.appendChild(item);
        });
    }

    document.getElementById("userInput").addEventListener("keypress", (e) => { if (e.key === "Enter") window.ask(); });
</script>
</body>
</html>
