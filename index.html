<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic AI V34</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    
    <style>
        /* ============================================================
           1. CSS VARIABLES & THEMES
           ============================================================ */
        :root {
            --bg: #131314;
            --sidebar: #1e1f20;
            --text: #e3e3e3;
            --input-bg: #1e1f20;
            --border: #444;
            --ai-bubble: transparent;
            --user-bubble: #2d2f31;
            --menu-hover: #37393b;
            --settings-bg: #2b2b2b;
            --accent: #b87cfc;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body.terminal {
            --bg: #0c0c0c; --sidebar: #161616; --text: #00ff00; --input-bg: #000; --border: #00ff00;
            --ai-bubble: transparent; --user-bubble: #003300; --accent: #00ff00;
            font-family: 'Courier New', monospace !important;
        }

        /* ============================================================
           2. CORE LAYOUT STYLES
           ============================================================ */
        body {
            font-family: var(--font-main);
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000;
        }

        #sidebar {
            width: 260px;
            background: var(--sidebar);
            display: none;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        #top-menu {
            background: var(--settings-bg);
            margin: 10px;
            border-radius: 8px;
            padding: 5px 0;
            border: 1px solid var(--border);
        }

        #settings-panel {
            display: none;
            padding: 12px;
            background: var(--settings-bg);
            border-top: 1px solid var(--border);
        }

        .settings-row {
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 12px;
        }

        .settings-input, .settings-select {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px;
            border-radius: 4px;
            outline: none;
        }

        /* ============================================================
           3. SIDEBAR NAVIGATION (NEW CHAT, RENAME, DELETE)
           ============================================================ */
        #new-chat-container {
            padding: 10px;
        }

        .btn-new-chat {
            width: 100%;
            background: var(--user-bubble);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: 0.2s;
        }

        .btn-new-chat:hover {
            background: var(--menu-hover);
            border-color: var(--accent);
        }

        #history-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .history-item {
            padding: 8px 10px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
            position: relative;
        }

        .history-item:hover { background: var(--menu-hover); }
        .history-item.active { background: var(--user-bubble); border-left: 2px solid var(--accent); }

        .history-actions {
            display: none;
            gap: 6px;
        }

        .history-item:hover .history-actions {
            display: flex;
        }

        .action-icon {
            opacity: 0.5;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }

        .action-icon:hover {
            opacity: 1;
            color: var(--accent);
        }

        .notif-dot {
            width: 7px; height: 7px;
            background-color: var(--accent);
            border-radius: 50%;
            margin-left: auto;
            margin-right: 5px;
            animation: pingPulse 1.5s infinite ease-in-out;
        }

        @keyframes pingPulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }

        /* ============================================================
           4. CHAT WINDOW STYLES
           ============================================================ */
        #main { flex: 1; display: none; flex-direction: column; }
        
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px 10%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .row { display: flex; gap: 12px; width: 100%; }
        .row.user { flex-direction: row-reverse; }

        .avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            background-size: cover;
            background-position: center;
            border: 1px solid var(--border);
        }

        .ai-avatar { background-image: url('https://www.meta.ai/images/cot_logo_static/orbit.png'); }

        .content {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14.5px;
            line-height: 1.4;
            font-family: var(--font-main); /* Normalized Font */
        }

        .user .content { background: var(--user-bubble); }

        /* Typing Dots Animation */
        .typing-dots { display: flex; gap: 4px; padding: 10px; align-items: center; }
        .typing-dots span {
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: dotBounce 1.4s infinite ease-in-out both;
        }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        #input-container { padding: 15px 10%; background: var(--bg); }
        .input-box {
            background: var(--input-bg);
            border-radius: 20px;
            padding: 8px 18px;
            display: flex;
            border: 1px solid var(--border);
            align-items: center;
        }

        input[type="text"] {
            flex: 1; background: transparent; border: none; color: var(--text); outline: none; font-size: 14px;
        }

        #sendBtn {
            background: none; border: none; color: var(--accent); cursor: pointer; font-size: 22px; padding-left: 10px;
        }
    </style>
</head>
<body id="app-body">

    <div id="login-overlay">
        <h1 style="color: white;">Cosmic AI V34</h1>
        <div id="g_id_onload" data-client_id="962541317340-h2tef7ghacll2okk8latem18qbsrs3hd.apps.googleusercontent.com" data-callback="unlockNow"></div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="sidebar">
        <div id="top-menu">
            <div id="settings-panel">
                <div class="settings-row">
                    <label>User Name</label>
                    <input type="text" id="username-input" class="settings-input" onchange="window.updateUsername(this.value)">
                </div>
                <div class="settings-row">
                    <label>Theme</label>
                    <select class="settings-select" onchange="window.updateTheme(this.value)">
                        <option value="default">Default Dark</option>
                        <option value="terminal">Matrix Terminal</option>
                    </select>
                </div>
                <div class="settings-btn" onclick="document.getElementById('file-upload').click()" style="margin-bottom:10px; background:var(--user-bubble); padding:6px; border-radius:4px; cursor:pointer; font-size:11px; text-align:center;">Change Avatar</div>
                <input type="file" id="file-upload" style="display:none" accept="image/*">
                
                <a href="https://github.com/Cosmic785/my-local-ai" target="_blank" style="display:block; margin-top:10px; color:var(--accent); text-decoration:none; font-size:11px; text-align:center;">🐛 Report a Bug</a>
                
                <button class="settings-btn" onclick="window.logout()" style="width:100%; background:#800; color:white; border:none; padding:6px; border-radius:4px; cursor:pointer; margin-top:10px;">Logout</button>
            </div>
            <div id="user-profile-trigger" onclick="window.toggleSettings()" style="padding:10px; display:flex; align-items:center; gap:10px; cursor:pointer;">
                <div id="user-profile-img" style="width:28px; height:28px; border-radius:50%; background-color:var(--accent); background-size:cover;"></div>
                <span id="display-name" style="font-size:12px;">Guest</span>
            </div>
        </div>

        <div id="new-chat-container">
            <button class="btn-new-chat" onclick="window.startNewChat()">+ New Conversation</button>
        </div>

        <div id="history-list"></div>
    </div>

    <div id="main">
        <div id="chat-window"></div>
        <div id="input-container">
            <div id="status" style="font-size:10px; color:#555; margin-bottom:4px;">SYSTEM INITIALIZING...</div>
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Type your message..." disabled>
                <button id="sendBtn" onclick="window.ask()">➤</button>
            </div>
        </div>
    </div>

<script>
    /* ------------------------------------------------------------
       FRONT-END UI CONTROLLER
       ------------------------------------------------------------ */
    window.toggleSettings = () => {
        const p = document.getElementById('settings-panel');
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    };

    window.updateUsername = (v) => {
        localStorage.setItem('cosmic_user_name', v);
        document.getElementById('display-name').innerText = v;
    };

    window.updateTheme = (t) => {
        document.getElementById('app-body').className = (t !== 'default') ? t : '';
        localStorage.setItem('cosmic_theme', t);
    };

    window.unlockNow = () => {
        localStorage.setItem('cosmic_auth_success', 'true');
        location.reload();
    };

    window.logout = () => {
        if(confirm("Sign out of Cosmic AI?")) {
            localStorage.removeItem('cosmic_auth_success');
            location.reload();
        }
    };

    if (localStorage.getItem('cosmic_auth_success') === 'true') {
        document.getElementById("login-overlay").style.display = "none";
        document.getElementById("sidebar").style.display = "flex";
        document.getElementById("main").style.display = "flex";
    }

    document.getElementById('file-upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('user-profile-img').style.backgroundImage = `url('${ev.target.result}')`;
                localStorage.setItem('custom_user_pic', ev.target.result);
            };
            reader.readAsDataURL(file);
        }
    });

    const cachedPic = localStorage.getItem('custom_user_pic');
    if (cachedPic) document.getElementById('user-profile-img').style.backgroundImage = `url('${cachedPic}')`;
    const cachedName = localStorage.getItem('cosmic_user_name');
    if (cachedName) document.getElementById('display-name').innerText = cachedName;
</script>

<script type="module">
    /* ------------------------------------------------------------
       CORE AI MODULE (EXPANDED)
       ------------------------------------------------------------ */
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";
    
    let engine, isGenerating = false, currentId = null;
    let chats = JSON.parse(localStorage.getItem('my_ai_chats')) || {};

    window.addEventListener('load', async () => {
        refreshSidebar();
        try {
            engine = await CreateMLCEngine("Llama-3.2-1B-Instruct-q4f16_1-MLC", {
                initProgressCallback: (p) => { 
                    document.getElementById("status").innerText = `LOADING BRAIN: ${Math.round(p.progress * 100)}%`; 
                }
            });
            document.getElementById("status").innerText = "COSMIC CORE ONLINE";
            document.getElementById("userInput").disabled = false;
        } catch (e) {
            document.getElementById("status").innerText = "CORE ERROR - RELOAD";
        }
    });

    window.ask = async () => {
        const input = document.getElementById("userInput");
        let val = input.value.trim();
        if (!val || isGenerating) return;

        if (!currentId) window.startNewChat();
        let targetId = currentId;

        if (chats[targetId].title === "New Conversation") {
            chats[targetId].title = val.substring(0, 24);
        }

        chats[targetId].history.push({ role: "user", content: val });
        input.value = "";
        window.render();
        isGenerating = true;

        const row = addRowUI("", "ai");
        const contentDiv = row.querySelector(".content");
        contentDiv.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;

        try {
            const chunks = await engine.chat.completions.create({
                messages: [
                    { role: "system", content: "You are Cosmic AI V34. Be helpful and clear." },
                    ...chats[targetId].history
                ],
                stream: true
            });

            let fullStr = "";
            for await (const chunk of chunks) {
                fullStr += chunk.choices[0]?.delta?.content || "";
                if (currentId === targetId) {
                    contentDiv.innerHTML = marked.parse(fullStr);
                    contentDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                    document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
                }
            }
            
            chats[targetId].history.push({ role: "assistant", content: fullStr });
            chats[targetId].hasNotif = (currentId !== targetId);
            save();
        } finally { 
            isGenerating = false; 
            window.render(); 
        }
    };

    window.startNewChat = () => {
        currentId = Date.now().toString();
        chats[currentId] = { title: "New Conversation", history: [], hasNotif: false };
        save();
        window.render();
    };

    window.selectChat = (id) => {
        currentId = id;
        if(chats[id]) chats[id].hasNotif = false;
        save();
        window.render();
    };

    window.renameChat = (id, e) => {
        e.stopPropagation();
        const n = prompt("Rename this chat:", chats[id].title);
        if (n && n.trim() !== "") {
            chats[id].title = n.trim();
            save();
            refreshSidebar();
        }
    };

    window.deleteChat = (id, e) => {
        e.stopPropagation();
        if (confirm("Delete this conversation permanently?")) {
            delete chats[id];
            if (currentId === id) currentId = null;
            save();
            window.render();
        }
    };

    window.render = () => {
        const win = document.getElementById("chat-window");
        win.innerHTML = "";
        if (currentId && chats[currentId]) {
            chats[currentId].history.forEach(m => addRowUI(m.content, m.role === 'user' ? 'user' : 'ai'));
        }
        win.scrollTop = win.scrollHeight;
        refreshSidebar();
    };

    function addRowUI(text, type) {
        const row = document.createElement("div");
        row.className = `row ${type}`;
        const avatarUrl = (type === 'ai') ? 'https://www.meta.ai/images/cot_logo_static/orbit.png' : (localStorage.getItem('custom_user_pic') || '');
        const style = avatarUrl ? `style="background-image: url('${avatarUrl}')"` : '';
        row.innerHTML = `<div class="avatar ${type}-avatar" ${style}></div><div class="content"></div>`;
        const c = row.querySelector(".content");
        if (type === 'ai') {
            c.innerHTML = marked.parse(text || '');
            c.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
        } else {
            c.innerText = text;
        }
        document.getElementById("chat-window").appendChild(row);
        return row;
    }

    function save() { localStorage.setItem('my_ai_chats', JSON.stringify(chats)); }

    function refreshSidebar() {
        const list = document.getElementById("history-list");
        list.innerHTML = "";
        Object.keys(chats).sort((a,b) => b-a).forEach(id => {
            const item = document.createElement("div");
            item.className = `history-item ${id === currentId ? 'active' : ''}`;
            item.onclick = () => window.selectChat(id);
            item.innerHTML = `
                <span class="history-title" style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${chats[id].title}</span>
                ${chats[id].hasNotif ? '<span class="notif-dot"></span>' : ''}
                <div class="history-actions">
                    <span class="action-icon" onclick="window.renameChat('${id}', event)">✏️</span>
                    <span class="action-icon" onclick="window.deleteChat('${id}', event)">🗑️</span>
                </div>
            `;
            list.appendChild(item);
        });
    }

    document.getElementById("userInput").addEventListener("keypress", (e) => { if(e.key === "Enter") window.ask(); });
</script>
</body>
</html>
