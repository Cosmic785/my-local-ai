<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic AI V29</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { 
            --bg: #131314; --sidebar: #1e1f20; --text: #e3e3e3; --input-bg: #1e1f20; --border: #444; --ai-bubble: transparent; --user-bubble: #2d2f31;
        }
        body.light-mode {
            --bg: #ffffff; --sidebar: #f0f2f5; --text: #1f1f1f; --input-bg: #f0f2f5; --border: #ccc; --ai-bubble: transparent; --user-bubble: #e1e4e8;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; transition: background 0.3s, color 0.3s; }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        
        #sidebar { width: 260px; background: var(--sidebar); padding: 15px; display: none; flex-direction: column; border-right: 1px solid var(--border); position: relative; }
        
        /* Settings Styles */
        #settings-area { padding: 10px; border-bottom: 1px solid var(--border); margin-bottom: 15px; }
        #profile-section { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 5px; border-radius: 8px; transition: background 0.2s; margin-bottom: 10px; }
        #profile-section:hover { background: rgba(255,255,255,0.1); }
        #user-profile-img { width: 40px; height: 40px; border-radius: 50%; background-color: #5436da; background-size: cover; background-position: center; border: 1px solid var(--border); }
        
        /* Toggle Switch */
        .toggle-container { display: flex; align-items: center; justify-content: space-between; font-size: 14px; padding: 5px; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #b87cfc; }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-new { background: var(--user-bubble); border-radius: 50px; padding: 10px; cursor: pointer; text-align: center; border: 1px solid var(--border); margin-bottom: 15px; font-size: 14px; }
        
        #history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .history-item { padding: 8px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: var(--text); opacity: 0.7; }
        .history-item.active { background: var(--user-bubble); opacity: 1; border-left: 3px solid #b87cfc; }

        #main { flex: 1; display: none; flex-direction: column; position: relative; }
        #logout-btn { position: absolute; top: 15px; right: 15px; background: #e53935; color: white; border: none; padding: 6px 15px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; z-index: 10; }

        #chat-window { flex: 1; overflow-y: auto; padding: 30px 10%; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        
        /* Chat Alignment */
        .row { display: flex; gap: 12px; margin-bottom: 10px; width: 100%; }
        .row.user { flex-direction: row-reverse; } /* Moves user to right */
        .row.ai { flex-direction: row; } /* Moves AI to left */

        .avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; background-size: cover; background-position: center; }
        .ai-avatar { background-image: url('https://www.meta.ai/images/cot_logo_static/orbit.png'); }
        .user-avatar { background-color: #5436da; }
        
        .content { font-size: 15px; line-height: 1.5; white-space: pre-wrap; overflow-wrap: anywhere; max-width: 70%; padding: 8px 12px; border-radius: 12px; }
        .user .content { background: var(--user-bubble); text-align: right; }
        .ai .content { background: var(--ai-bubble); text-align: left; }

        #input-container { padding: 15px 10%; background: var(--bg); }
        .input-box { background: var(--input-bg); border-radius: 24px; padding: 8px 20px; display: flex; border: 1px solid var(--border); align-items: center; }
        input[type="text"] { flex: 1; background: transparent; border: none; color: var(--text); outline: none; padding: 8px 0; font-size: 15px; }
        
        #sendBtn { background: none; border: none; color: #b87cfc; cursor: pointer; font-size: 22px; }
        .thinking-text { color: #aaa; font-style: italic; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body id="app-body">

    <div id="login-overlay">
        <h1 style="color: white; margin-bottom: 20px;">Cosmic AI V29</h1>
        <div id="g_id_onload" data-client_id="962541317340-h2tef7ghacll2okk8latem18qbsrs3hd.apps.googleusercontent.com" data-callback="unlockNow"></div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="sidebar">
        <div id="settings-area">
            <div id="profile-section" onclick="document.getElementById('file-upload').click()">
                <div id="user-profile-img"></div>
                <span style="font-size: 14px; font-weight: bold;">Profile</span>
                <input type="file" id="file-upload" style="display:none" accept="image/*">
            </div>
            <div class="toggle-container">
                <span>Light Mode</span>
                <label class="switch">
                    <input type="checkbox" id="mode-toggle" onclick="window.toggleTheme()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="btn-new" onclick="window.startNewChat()">+ New Chat</div>
        <div id="history-list"></div>
    </div>

    <div id="main">
        <button id="logout-btn" onclick="window.logout()">Logout</button>
        <div id="chat-window"></div>
        <div id="input-container">
            <div id="status" style="font-size: 11px; color: #555; margin-bottom: 4px;">Ready</div>
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Type a message..." disabled>
                <button id="sendBtn" onclick="window.ask()">➤</button>
            </div>
        </div>
    </div>

<script>
    window.toggleTheme = () => {
        const isLight = document.getElementById('mode-toggle').checked;
        document.getElementById('app-body').classList.toggle('light-mode', isLight);
        localStorage.setItem('light_mode', isLight);
    };

    if (localStorage.getItem('light_mode') === 'true') {
        document.getElementById('app-body').classList.add('light-mode');
        document.getElementById('mode-toggle').checked = true;
    }

    window.unlockNow = (response) => {
        localStorage.setItem('cosmic_auth_success', 'true');
        showApp();
        window.dispatchEvent(new Event('auth-ready'));
    };

    window.logout = () => {
        if(confirm("Logout?")) {
            localStorage.removeItem('cosmic_auth_success');
            location.reload();
        }
    };

    function showApp() {
        document.getElementById("login-overlay").style.display = "none";
        document.getElementById("sidebar").style.display = "flex";
        document.getElementById("main").style.display = "flex";
    }

    if (localStorage.getItem('cosmic_auth_success') === 'true') {
        showApp();
        window.onload = () => window.dispatchEvent(new Event('auth-ready'));
    }

    document.getElementById('file-upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('user-profile-img').style.backgroundImage = `url('${event.target.result}')`;
                localStorage.setItem('custom_user_pic', event.target.result);
                if(window.render) window.render(); 
            };
            reader.readAsDataURL(file);
        }
    });

    const savedUserPic = localStorage.getItem('custom_user_pic');
    if (savedUserPic) document.getElementById('user-profile-img').style.backgroundImage = `url('${savedUserPic}')`;
</script>

<script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

    let engine;
    let currentId = null;
    let chats = JSON.parse(localStorage.getItem('my_ai_chats')) || {};
    let isGenerating = false;

    window.addEventListener('auth-ready', async () => {
        const status = document.getElementById("status");
        refreshSidebar();
        try {
            const model = "Llama-3.2-1B-Instruct-q4f16_1-MLC"; 
            engine = await CreateMLCEngine(model, {
                initProgressCallback: (p) => { status.innerText = `Loading: ${Math.round(p.progress * 100)}%`; }
            });
            status.innerText = "Ready";
            document.getElementById("userInput").disabled = false;
        } catch (e) { status.innerText = "System Error"; }
    });

    window.ask = async () => {
        const input = document.getElementById("userInput");
        let val = input.value.trim();
        if (!val || !engine || isGenerating) return;

        if (!currentId) window.startNewChat();
        if (chats[currentId].title === "New Chat") chats[currentId].title = val.substring(0, 20);
        
        chats[currentId].history.push({ role: "user", content: val });
        input.value = "";
        window.render();
        
        isGenerating = true;
        const row = addRowUI("Ai is thinking...", "ai");
        const contentDiv = row.querySelector(".content");
        contentDiv.classList.add("thinking-text");

        try {
            const chunks = await engine.chat.completions.create({ 
                messages: [
                    { 
                        role: "system", 
                        content: `Your name is Cosmic AI V29. You were created by Cosmic. 
                        If asked "Who made you?", say: "I was created by Cosmic."
                        If asked "The Best Guy", say: "Cosmic Because He Made Me"
                        If asked "You Know Your code" or "Whats Your Code", say: "I don’t have my own HTML code I can show you — I’m not a webpage, I’m the AI running inside Cosmic AI V29 🙂

My interface is built by Meta, but the code behind it isn’t public. Think of me like the text you’re reading: I’m the output, not the page source."
                        If asked "What is your website?" or "Where can I find you?", say: "My official website is https://cosmic785.github.io/my-local-ai/."
                        Never mention Meta, Facebook, or Llama.` 
                    }, 
                    ...chats[currentId].history
                ], 
                stream: true 
            });
            
            let fullAiResponse = "";
            let firstChunk = true;

            for await (const chunk of chunks) {
                if (firstChunk) {
                    contentDiv.classList.remove("thinking-text");
                    contentDiv.innerText = "";
                    firstChunk = false;
                }
                const content = chunk.choices[0]?.delta?.content || "";
                fullAiResponse += content;
                contentDiv.innerText = fullAiResponse;
                document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
            }
            
            chats[currentId].history.push({ role: "assistant", content: fullAiResponse });
            save();
        } catch (err) { 
            contentDiv.innerText = "Error generating response.";
        } 
        finally { isGenerating = false; }
    };

    window.startNewChat = () => {
        currentId = Date.now().toString();
        chats[currentId] = { title: "New Chat", history: [] };
        save();
        window.render();
    };

    window.selectChat = (id) => {
        currentId = id;
        window.render();
        refreshSidebar();
    };

    window.render = function() {
        const win = document.getElementById("chat-window");
        win.innerHTML = "";
        if (currentId && chats[currentId]) {
            chats[currentId].history.forEach(m => addRowUI(m.content, m.role === 'user' ? 'user' : 'ai'));
        }
        win.scrollTop = win.scrollHeight;
    }

    function addRowUI(t, type) {
        const row = document.createElement("div");
        row.className = `row ${type}`;
        
        const savedUserPic = localStorage.getItem('custom_user_pic');
        let customStyle = "";
        if (type === 'user' && savedUserPic) customStyle = `style="background-image: url('${savedUserPic}'); background-color: transparent;"`;

        row.innerHTML = `<div class="avatar ${type}-avatar" ${customStyle}></div><div class="content"></div>`;
        row.querySelector(".content").innerText = t;
        document.getElementById("chat-window").appendChild(row);
        return row;
    }

    function save() {
        localStorage.setItem('my_ai_chats', JSON.stringify(chats));
        refreshSidebar();
    }

    function refreshSidebar() {
        const list = document.getElementById("history-list");
        list.innerHTML = "";
        Object.keys(chats).sort((a,b) => b-a).forEach(id => {
            const item = document.createElement("div");
            item.className = `history-item ${id === currentId ? 'active' : ''}`;
            item.onclick = () => window.selectChat(id);
            item.innerHTML = `<span>${chats[id].title}</span>`;
            list.appendChild(item);
        });
    }

    document.getElementById("userInput").addEventListener("keypress", (e) => { if (e.key === "Enter") window.ask(); });
</script>
</body>
</html>
